services:
  # ==========================================
  # 0. LE PANEL DE CONTRÔLE (Web Terminal)
  # ==========================================
  web_terminal:
    image: tsl0922/ttyd:alpine
    container_name: web_terminal
    ports:
      - "7681:7681"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command: >
      sh -c "apk add --no-cache curl iputils-ping docker-cli && ttyd -W -p 7681 sh"
    networks:
      - front-net

  # ==========================================
  # 1. LAB ÉCHANGES & TLS (Wireshark + Nginx)
  # ==========================================
  wireshark_web:
    image: lscr.io/linuxserver/wireshark:latest
    container_name: demo_wireshark
    cap_add: [NET_ADMIN]
    security_opt: [seccomp:unconfined]
    ports:
      - "3000:3000"
      - "8082:80"   
      - "8444:443"  
    networks:
      - front-net

  serveur_web:
    image: nginx:alpine
    container_name: demo_serveur
    network_mode: "service:wireshark_web"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/nginx.crt:/etc/nginx/ssl/nginx.crt:ro
      - ./nginx/nginx.key:/etc/nginx/ssl/nginx.key:ro

  # ==========================================
  # 2. LAB SÉCURITÉ RÉSEAU (Micro-segmentation)
  # ==========================================
  app_backend:
    image: alpine
    container_name: app_backend
    command: sleep infinity
    networks:
      - front-net
      - back-net

  app_database:
    image: alpine
    container_name: app_database
    command: nc -lk -p 5432
    networks:
      - back-net

  # ==========================================
  # 3. LAB GESTION DES ACCÈS (OPA)
  # ==========================================
  opa:
    image: openpolicyagent/opa:latest
    container_name: demo_opa
    command:
      - "run"
      - "--server"
      - "--addr=0.0.0.0:8181"
      - "/policy.rego"
    volumes:
      - ./policy.rego:/policy.rego:ro
    networks:
      - front-net

  # ==========================================
  # 4. LAB SÉCURITÉ APPLICATIVE (AppSec - OWASP)
  # ==========================================
  app_vulnerable:
    image: python:3.9-alpine
    container_name: app_vulnerable
    ports:
      - "8081:8080"
    volumes:
      - ./app.py:/app/app.py:ro
    working_dir: /app
    command: sh -c "pip install flask && python app.py"
    networks:
      - front-net

networks:
  front-net:
    driver: bridge
  back-net:
    driver: bridge
